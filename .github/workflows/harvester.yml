name: Harvester

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write
  discussions: read

concurrency:
  group: harvester
  cancel-in-progress: false

jobs:
  sync-ratings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Harvest discussion ratings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/gitops/harvest.ts

      - name: Commit ratings updates (if changed)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ratings.json data/discussion-urls.json
          git commit -m "chore(gitops): update ratings and discussion URLs"
          for i in 1 2 3; do
            git pull --rebase origin master || true
            if git push; then exit 0; fi
            sleep 2
          done
          echo "Push failed after retries."
          exit 1

      - name: Regenerate README list section
        run: npm run readme

      - name: Commit README (if changed)
        run: |
          if git diff --quiet README.md; then
            echo "README is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): update generated list"
          for i in 1 2 3; do
            git pull --rebase origin master || true
            if git push; then exit 0; fi
            sleep 2
          done
          echo "Push failed after retries."
          exit 1

