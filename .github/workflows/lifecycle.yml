name: Lifecycle

on:
  push:
    branches:
      - master
    paths:
      - "data/resources.json"
  workflow_dispatch:
    inputs:
      mode:
        description: "diff (default) or bootstrap (create discussions for all unmapped resources)"
        required: false
        default: "diff"

permissions:
  contents: write
  discussions: write

concurrency:
  group: gitops-master
  cancel-in-progress: false

jobs:
  sync-discussions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync Discussions and mapping file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIFECYCLE_MODE: ${{ github.event.inputs.mode }}
        run: npx tsx scripts/gitops/lifecycle.ts

      - name: Commit mapping updates (if changed)
        if: ${{ always() }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/discussion-map.json
          git commit -m "chore(gitops): sync discussion map"
          for i in 1 2 3; do
            git pull --rebase origin master || true
            if git push; then exit 0; fi
            sleep 2
          done
          echo "Push failed after retries."
          exit 1

      - name: Regenerate README list section
        run: npm run readme

      - name: Commit README (if changed)
        run: |
          if git diff --quiet README.md; then
            echo "README is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): update generated list"
          for i in 1 2 3; do
            git pull --rebase origin master || true
            if git push; then exit 0; fi
            sleep 2
          done
          echo "Push failed after retries."
          exit 1

