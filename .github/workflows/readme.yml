name: README

on:
  push:
    paths:
      - "data/resources.json"
      - "data/collections.json"
      - "scripts/generate-readme.ts"
      - "types/index.ts"
      - "README.md"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "data/resources.json"
      - "data/collections.json"
      - "scripts/generate-readme.ts"
      - "types/index.ts"
      - "README.md"
      - "package.json"
      - "package-lock.json"

jobs:
  verify-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate README list section
        run: npm run readme

      - name: Ensure README matches generator output
        run: git diff --exit-code README.md
